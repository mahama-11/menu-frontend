server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Runtime-injected env config should not be cached.
  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    expires -1;
    try_files $uri =404;
  }

  # Static assets can be cached aggressively and should 404 if missing.
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Explicitly serve existing static files before SPA fallback.
  location = /favicon.ico { try_files $uri =404; }
  location = /icons.svg { try_files $uri =404; }

  # SPA history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
